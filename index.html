<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Centro Médico Alas - Buenos Aires</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Tahoma;
background:#f8f9fa;
color:#333;
}

/* NAV */
nav{
background:white;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

nav .container{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
max-width:1200px;
margin:auto;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
background:#0a3d62;
color:white;
padding:8px 12px;
border-radius:6px;
text-decoration:none;
font-weight:600;
}

nav a:hover{background:#083050;}

.container{max-width:1200px;margin:auto;padding:20px;}

/* HERO */
.hero{
display:flex;
min-height:500px;
background:linear-gradient(135deg,#0a3d62,#1b6ba8);
color:white;
}

.hero-left,.hero-right{
width:25%;
position:relative;
overflow:hidden;
}

.hero-center{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{font-size:40px;margin-bottom:10px;}
.hero p{margin-bottom:15px;}

.carousel-img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.carousel-img.active{opacity:1;}

.hero-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
background:#25D366;
color:white;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.btn-secondary{
background:white;
color:#0a3d62;
}

/* SECCIONES */
section{padding:50px 20px;}
h2{text-align:center;margin-bottom:30px;color:#0a3d62;}

/* SERVICIOS */
.services-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

/* WHATSAPP */
.floating-whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
text-decoration:none;
z-index:999;
}

/* RESPONSIVE */
@media(max-width:768px){

.hero{
flex-direction:column;
}

.hero-left,.hero-right{
width:100%;
height:200px;
}

.hero h1{font-size:28px;}

nav ul{
flex-wrap:wrap;
gap:10px;
}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="container">
<div class="logo">
<img src="imagenes/logo.jpg" style="height:70px;">
</div>

<ul>
<li><a href="#inicio">Inicio</a></li>
<li><a href="#servicios">Servicios</a></li>
<li><a href="#nosotros">Nosotros</a></li>
</ul>
</div>
</nav>

<!-- HERO -->
<div class="hero" id="inicio">

<div class="hero-left">
<img src="imagenes/img1.jpg" class="carousel-img active">
<img src="imagenes/img2.jpg" class="carousel-img">
<img src="imagenes/img3.jpg" class="carousel-img">
</div>

<div class="hero-center">
<h1>Centro Médico Alas</h1>
<p>Turnos disponibles esta semana</p>

<div class="hero-buttons">
<a href="https://clansis.com.ar/centro_medico_alas" class="btn" target="_blank">
<i class="fas fa-calendar-check"></i> Turnos
</a>

<a href="https://wa.me/5491135998023" class="btn btn-secondary" target="_blank">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>
</div>
</div>

<div class="hero-right">
<img src="imagenes/img1.jpg" class="carousel-img active">
<img src="imagenes/img2.jpg" class="carousel-img">
<img src="imagenes/img3.jpg" class="carousel-img">
</div>

</div>

<!-- SERVICIOS -->
<section id="servicios">
<div class="container">
<h2>Servicios</h2>

<div class="services-grid">
<div class="card">Especialidades Médicas</div>
<div class="card">Laboratorio</div>
<div class="card">Estudios</div>
<div class="card">Diagnóstico por Imágenes</div>
</div>

</div>
</section>

<!-- NOSOTROS -->
<section id="nosotros">
<div class="container">
<h2>Sobre Nosotros</h2>
<p style="text-align:center;">
Atención médica integral en Balvanera con profesionales calificados.
</p>
</div>
</section>

<!-- FOOTER -->
<footer style="background:#0a3d62;color:white;text-align:center;padding:20px;">
© 2026 Centro Médico Alas
</footer>

<!-- BOTON WHATSAPP -->
<a href="https://wa.me/5491135998023" class="floating-whatsapp" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>
function initCarousel(selector){
const imgs=document.querySelectorAll(selector+" .carousel-img");
let i=0;
setInterval(()=>{
imgs[i].classList.remove("active");
i=(i+1)%imgs.length;
imgs[i].classList.add("active");
},4000);
}

initCarousel(".hero-left");
initCarousel(".hero-right");
</script>

</body>
</html>
